/* =============================   Helpers: hex alpha processing============================= */
function hexToRgb(hex){
  hex = hex.replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  const n = parseInt(hex,16);
  return {r:(n>>16)&255,g:(n>>8)&255,b:n&255};
}
function rgbToHex({r,g,b}){
  const h=x=>x.toString(16).padStart(2,'0');
  return `#${h(r)}${h(g)}${h(b)}`;
}
function lighten(hex,t=0.15){
  const {r,g,b}=hexToRgb(hex);
  return rgbToHex({
    r:Math.round(r+(255-r)*t),
    g:Math.round(g+(255-g)*t),
    b:Math.round(b+(255-b)*t)
  });
}
function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[c]));
}

/* =============================   Build pills (Categorical sums)============================= */
const counts = {};
STATE_ROWS.forEach(r => counts[r.cat] = (counts[r.cat]||0)+1);

const pillOrder = Object.entries(counts)
  .sort((a,b)=>b[1]-a[1])
  .map(([cat, n]) => ({cat, n}));

const pills = document.getElementById("pills");
pills.innerHTML = pillOrder.map(p => {
  const color = CATEGORY_COLOR[p.cat] || "#9aa6bf";
  return `<div class="pill"><span class="sw" style="background:${color}"></span>${esc(p.cat)} (${p.n})</div>`;
}).join("");

/* =============================   Build 4-column state table============================= */
const lists = document.getElementById("lists");
const sorted = STATE_ROWS.slice().sort((a,b)=>a.state.localeCompare(b.state));

const COLS = 4;
const perCol = Math.ceil(sorted.length / COLS);

for(let i=0;i<COLS;i++){
  const chunk = sorted.slice(i*perCol,(i+1)*perCol);
  const col = document.createElement("div");
  col.className = "col";
  col.innerHTML = chunk.map(r => `
    <div class="row">
      <div class="name" title="${esc(r.state)}">${esc(r.state)}</div>
      <div class="val">${esc(r.culprit)}</div>
    </div>
  `).join("");
  lists.appendChild(col);
}

/* =============================   Map layer render (US Atlas TopoJSON)============================= */
const svg = d3.select("#map");
const tooltip = d3.select("#tt");
const width = 975, height = 610;

const projection = d3.geoAlbersUsa().scale(1300).translate([width/2, height/2]);
const path = d3.geoPath(projection);

function placeTooltip(event){
  const rect = tooltip.node().getBoundingClientRect();
  const pad = 10;
  let x = event.pageX + 14;
  let y = event.pageY + 14;
  if (x + rect.width > window.innerWidth - pad) x = window.innerWidth - rect.width - pad;
  if (y + rect.height > window.innerHeight - pad) y = window.innerHeight - rect.height - pad;
  tooltip.style("left", x+"px").style("top", y+"px");
}

function showTip(event, stateName, data){
  tooltip
    .style("display","block")
    .html(
      `<strong>${esc(stateName)}</strong>
       <div class="tooltip-stat">🚨 Vector: ${esc(data.culprit)}</div>
       <div>Annual Encounter Odds: <b>${esc(data.odds)}</b></div>
       <div>Implied Probability: <b>${esc(data.prob)}</b></div>
       <div class="narrative">${esc(data.text)}</div>`
    );
  placeTooltip(event);
}

function hideTip(){ tooltip.style("display","none"); }

d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(us => {
  const states = topojson.feature(us, us.objects.states).features;
  const g = svg.attr("viewBox", `0 0 ${width} ${height}`).append("g");

  const layer = g.selectAll("g.state")
    .data(states)
    .join("g")
    .attr("class","state");

  // Base Geographic Color Polygons
  layer.append("path")
    .attr("d", path)
    .attr("fill", d => {
      const row = ROW_BY_STATE[d.properties.name];
      return row ? CATEGORY_COLOR[row.cat] : "#162620";
    })
    .attr("fill-opacity", 0.88);

  // High-contrast clean state outlines
  layer.append("path").attr("d", path)
    .attr("fill","none").attr("stroke","#fff").attr("stroke-opacity",0.12)
    .attr("stroke-width",1.0).attr("stroke-linejoin","round");

  // Interaction Hover Outlines
  layer.append("path")
    .attr("class","hover-outline")
    .attr("d", path)
    .attr("fill","none")
    .attr("stroke","#f4f7f5")
    .attr("stroke-opacity",0)
    .attr("stroke-width",2.2)
    .attr("pointer-events","none");

  // SVG Custom Silhouette Icons Placement Engine
  const gIcons = g.append("g");

  states.forEach(d => {
    const name = d.properties.name;
    const row = ROW_BY_STATE[name];
    if(!row || !SVG_PATH_DICTIONARY[row.icon]) return;

    // Calculate boundary centers for balanced label placement
    const centroid = path.centroid(d);
    if (!centroid || isNaN(centroid[0]) || isNaN(centroid[1])) return;

    // Responsive icon scaling based on relative state shape areas
    const [[x0,y0],[x1,y1]] = path.bounds(d);
    const size = Math.max(16, Math.min(28, Math.min(x1-x0, y1-y0) * 0.4));

    // Append vector paths cleanly centered over state data points
    gIcons.append("path")
      .attr("d", SVG_PATH_DICTIONARY[row.icon])
      .attr("class", "map-vector-icon")
      .attr("transform", `translate(${centroid[0] - size/2}, ${centroid[1] - size/2}) scale(${size / 24})`)
      .style("pointer-events", "none");
  });

  // Wire event handlers to vector geometry layers
  layer.on("mousemove", (event, d) => {
      const row = ROW_BY_STATE[d.properties.name];
      if(!row){ hideTip(); return; }
      showTip(event, d.properties.name, row);
      d3.select(event.currentTarget).select(".hover-outline").attr("stroke-opacity", .65);
    })
    .on("mouseout", (event) => {
      hideTip();
      d3.select(event.currentTarget).select(".hover-outline").attr("stroke-opacity", 0);
    });

}).catch(err => console.error("US TopoJSON pipeline error:", err));

/* =============================   Embed code generation module ============================= */
const embedToggle = document.getElementById("embedToggle");
const embedPanel  = document.getElementById("embedPanel");
const embedCode   = document.getElementById("embedCode");

embedCode.value = `<iframe\n  src="${CANONICAL_URL}"\n  title="Most Dangerous Animal In Each State"\n  width="100%" height="1100"\n  style="border:0;overflow:hidden;display:block;width:100%;"\n  loading="lazy">\n</iframe>`;

embedToggle.addEventListener("click", () => {
  const hidden = embedPanel.hasAttribute("hidden");
  if(hidden){
    embedPanel.removeAttribute("hidden");
    embedToggle.setAttribute("aria-expanded","true");
    embedToggle.textContent = "Hide embed code";
  }else{
    embedPanel.setAttribute("hidden","");
    embedToggle.setAttribute("aria-expanded","false");
    embedToggle.textContent = "Get embed code";
  }
});
</script>
