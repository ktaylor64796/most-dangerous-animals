    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;

        }
        #map-title {
            text-align: center;
            padding: 25px 10px 5px 10px;
            margin: 0;
            color: #111;
            font-size: 28px;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 0.5px;
        }
        #map-subtitle {

        #map {
            width: 100%;
            height: 620px;
            max-width: 1050px;
            margin: 0 auto;
            background: #fcfbf7; /* Removed the blue ocean background for a clean cutout style */

        /* State Graphic Marker Styling */
        .state-icon-svg {
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .state-icon-svg svg {
            width: 26px;
            height: 26px;
            fill: #2c2520; /* Dark charcoal silhouette fill */

            padding: 10px 14px;
            font: bold 13px Helvetica, Arial, sans-serif;
            background: #fff;
            border: 2px solid #2c2520;
            box-shadow: 4px 4px 0px #2c2520;
            border-radius: 0px;
            color: #2c2520;

        .info h4 {
            margin: 0 0 6px;
            text-transform: uppercase;
            font-size: 14px;
            border-bottom: 2px solid #2c2520;
            padding-bottom: 3px;
        }
        /* Minimalist Legend Block */
        .legend {
            line-height: 20px;
            color: #2c2520;
            background: white;
            padding: 12px;
            border: 2px solid #2c2520;
            box-shadow: 4px 4px 0px #2c2520;
            font: bold 12px Arial, sans-serif;
            text-transform: uppercase;
        }
        .legend i {
            width: 16px;
            height: 16px;
            float: left;
            margin-right: 10px;
            border: 1px solid rgba(0,0,0,0.2);
        }

            "Wisconsin": { culprit: "Whitetail Deer", odds: "1 in 62,000", prob: "0.00161%", cat: "Deer Collisions", path: 'deer', lat: 44.2, lng: -89.6 },
            "Wyoming": { culprit: "Grizzly Bear", odds: "1 in 28,000", prob: "0.00357%", cat: "Apex Predators", path: 'predator', lat: 42.7, lng: -107.3 }
        };

        // Render Clean Geographic Polygons
        function style(feature) {
            const stateName = feature.properties.name;
            const data = animalData[stateName];
            return {
                fillColor: data ? stateColors[data.category || data.cat] : '#fcfbf7',
                weight: 1.5,
                opacity: 1,
                color: '#fcfbf7', // Inset off-white border separator lines matching your asset
                fillOpacity: 1
            };
        }

        // Standard Interface Control Logic
        const info = L.control();
        info.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info');
            this.update();
            return this._div;
        };
        info.update = function (props) {
            this._div.innerHTML = '<h4>State Encounter Data</h4>' + (props && animalData[props.name] ?
                '<b>' + props.name + '</b><br />' +
                '🎯 Top Hazard: <strong>' + animalData[props.name].culprit + '</strong><br />' +
                '📊 Annual Odds: ' + animalData[props.name].odds
                : 'Hover over an active state layer');
        };
        info.addTo(map);

        function highlightFeature(e) {
            const layer = e.target;
            layer.setStyle({ weight: 2.5, color: '#2c2520' });
            if (animalData[layer.feature.properties.name]) {
                info.update(layer.feature.properties);
            }
        }

        let geojson;
        function resetHighlight(e) {
            geojson.resetStyle(e.target);
            info.update();
        }

        function onEachFeature(feature, layer) {
            layer.on({
                mouseover: highlightFeature,
                mouseout: resetHighlight
            });
        }

        // Fetch Borders and Deploy Graphic Layer Markers Natively
        fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json')
            .then(response => response.json())
            .then(data => {
                geojson = L.geoJson(data, {
                    style: style,
                    onEachFeature: onEachFeature
                }).addTo(map);

                // Iterate through our coordinated matrix and anchor graphic indicators directly over matching states
                Object.keys(animalData).forEach(state => {
                    const item = animalData[state];
                    if (svgPaths[item.path]) {
                        const icon = L.divIcon({
                            html: svgPaths[item.path],
                            className: 'state-icon-svg',
                            iconSize: [26, 26],
                            iconAnchor: [13, 13]
                        });
                        L.marker([item.lat, item.lng], { icon: icon, interactive: false }).addTo(map);
                    }
                });
            });

        // Generate Bottom Right Map Key
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<strong>Key Categories</strong><br>';
            Object.keys(stateColors).forEach(cat => {
                div.innerHTML += `<i style="background:${stateColors[cat]}"></i> ${cat}<br>`;
            });
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
