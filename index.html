            "Washington": { culprit: "Western Yellow Jacket", odds: "1 in 155,000", prob: "0.00065%", cat: "Stinging Insects", icon: 'insect', size: 32, lat: 47.4, lng: -121.4, text: "While wilderness tracks hold cougars and black bears, the total volume of medical interventions is dominated by timberline wasps." },
            "West Virginia": { culprit: "Whitetail Deer", odds: "1 in 30,271", prob: "0.00330%", cat: "Deer Collisions", icon: 'moose', size: 28, lat: 38.6, lng: -80.5, text: "Mountain slopes paired with heavy canopy cover give West Virginia the single highest vehicle-animal collision index in the lower 48." },
            "Wisconsin": { culprit: "Whitetail Deer", odds: "1 in 62,000", prob: "0.00161%", cat: "Deer Collisions", icon: 'moose', size: 30, lat: 44.2, lng: -89.6, text: "Massive localized deer populations crossing high-speed northern transit grids easily outpace low gray wolf and black bear metrics." },
            "Wyoming": { culprit: "Grizzly Bear", odds: "1 in 28,000", prob: "0.00357%", cat: "Apex Predators", icon: 'predator', size: 34, lat: 42.7, lng: -107.3, text: "Extensive wilderness trail networks across the Greater Yellowstone Ecosystem track frequent, high-stakes contact with defensive grizzlies." }
        };

        // Render Clean Geographic Polygons
        function styleRegionPolygons(feature) {
            // Unbreakable lookup using both standard US and Canadian property names
            const name = feature.properties.name || feature.properties.NAME;
            const data = regionWildlifeData[name];
            return {
                fillColor: data ? designColors[data.cat] : '#f6f1e8',
                weight: 1.5,
                opacity: 1,
                color: '#f6f1e8', /* Clean matte separator lines */
                fillOpacity: 0.9
            };
        }

        // Dashboard Overlay Setup
        const UIOverlay = L.control();
        UIOverlay.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info');
            this.update();
            return this._div;
        };
        UIOverlay.update = function (props) {
            const name = props ? (props.name || props.NAME) : null;
            if (name && regionWildlifeData[name]) {
                const region = regionWildlifeData[name];
                this._div.innerHTML = `<h4>${name} Field Analysis</h4>
                    <p>🎯 <b>Primary Vector:</b> <strong>${region.culprit}</strong></p>
                    <p>📊 <b>Annual Encounter Odds:</b> <strong>${region.odds}</strong></p>
                    <p>📈 <b>Implied Probability:</b> <strong>${region.prob}</strong></p>
                    <p class="info-narrative">${region.text}</p>`;
            } else {
                this._div.innerHTML = '<h4>Continental Threat Register</h4>Hover over an active boundary layer';
            }
        };
        UIOverlay.addTo(map);

        function focusLayer(e) {
            const layer = e.target;
            layer.setStyle({ weight: 2.5, color: '#231f20' });
            const name = layer.feature.properties.name || layer.feature.properties.NAME;
            if (regionWildlifeData[name]) {
                UIOverlay.update(layer.feature.properties);
            }
        }

        let topoJsonLayer;
        function blurLayer(e) {
            topoJsonLayer.resetStyle(e.target);
            UIOverlay.update();
        }

        function onEachFeature(feature, layer) {
            layer.on({
                mouseover: focusLayer,
                mouseout: blurLayer
            });
        }

        // Load authoritative U.S. State Boundaries (Individual polygons instead of single country frame)
        fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-us-115/master/data/us-states.geojson')
            .then(res => res.json())
            .then(usData => {
                // Render US Polygons smoothly
                topoJsonLayer = L.geoJson(usData, {
                    style: styleRegionPolygons,
                    onEachFeature: onEachFeature
                }).addTo(map);

                // Fetch and overlay Canadian provincial shapes right alongside them
                return fetch('https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/canada.geojson');
            })
            .then(res => res.json())
            .then(caData => {
                // Render Canadian Polygons to the same map frame
                L.geoJson(caData, {
                    style: styleRegionPolygons,
                    onEachFeature: onEachFeature
                }).addTo(map);

                // Build Silhouette Icon Layers cleanly over coordinated centroids
                Object.keys(regionWildlifeData).forEach(regionName => {
                    const meta = regionWildlifeData[regionName];
                    if (svgIcons[meta.icon]) {
                        const renderingSize = meta.size || 26; 
                        const scaledPath = svgIcons[meta.icon]
                            .replace('class="state-vector-icon"', `class="state-vector-icon" style="width:${renderingSize}px; height:${renderingSize}px;"`);

                        const customLabelMarker = L.divIcon({
                            html: `<div class="state-label-wrapper">
                                    ${scaledPath}
                                    <span class="state-abbrev-text">${regionName.substring(0,3)}</span>
                                   </div>`,
                            className: 'leaflet-div-icon-custom-override',
                            iconSize: [60, 60],
                            iconAnchor: [30, 30]
                        });
                        L.marker([meta.lat, meta.lng], { icon: customLabelMarker, interactive: false }).addTo(map);
                    }
                });
            });

        // Initialize Legend Key Board Layout
        const mapLegend = L.control({position: 'bottomright'});
        mapLegend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<strong>Threat Vector Class</strong><br>';
            Object.keys(designColors).forEach(category => {
                div.innerHTML += `<i style="background:${designColors[category]}"></i> ${category}<br>`;
            });
            return div;
        };
        mapLegend.addTo(map);
    </script>
</body>
</html>
