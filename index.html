      padding: 26px 16px 40px;

    header {
      text-align: center;
      padding: 4px 0 14px;
    }
    h1 {
      margin: 0;
      font-size: clamp(24px, 2.6vw, 36px);
      font-weight: 950;
      letter-spacing: -.02em;
      text-transform: uppercase;
      color: #fff;
      border-left: 5px solid #da291c; /* CSB Red accent bar */
      padding-left: 15px;
      display: inline-block;
    }

    .card {
      background: linear-gradient(180deg, var(--cardTop), var(--cardBottom));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* MAP GRID LAYER */
    .map-wrap { padding: 16px; }
    .map-frame {
      background: rgba(0, 0, 0, .25);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      position: relative;
    }
    svg { width: 100%; height: auto; display: block; position: relative; z-index: 1; }

    /* STATE LAYER INTERACTION HOVERS */
    .state {
      cursor: pointer;
    }

    .hover-outline {
      transition: stroke-opacity 0.15s ease;
    }

    /* HIGH-FIDELITY SHADOW ICON ENGINE */
    .map-vector-icon {
      fill: #01040a;
      opacity: 0.85;
      pointer-events: none;
      filter: drop-shadow(0px 2px 3px rgba(0, 0, 0, 0.65));
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 14px 6px;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 900;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .sw {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,.2);
    }

    .hint {
      padding: 4px 14px 0;
      font-size: 11px;
      color: var(--muted);
      font-weight: 800;
    }

    .lists {
      padding: 14px;
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(4,1fr);
    }

    @media(max-width:820px){ .lists{grid-template-columns:repeat(2,1fr);} }
    @media(max-width:520px){ .lists{grid-template-columns:1fr;} }

    .col {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      min-width: 0;
    }
    .row {

      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 6px;
      border-bottom: 1px dashed rgba(255,255,255,.08);
      font-size: 12px;
      line-height: 1.3;

      font-weight: 900;
      color: rgba(245,247,251,.85);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;

      resize: none;
      background: transparent;

      pointer-events: none;
      display: none;
      z-index: 999;

const ROW_BY_STATE = Object.fromEntries(STATE_ROWS.map(r => [r.state, r]));

function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[c]));
}

// Draw the category pill headers dynamically
const counts = {};
STATE_ROWS.forEach(r => counts[r.cat] = (counts[r.cat]||0)+1);
const pillOrder = Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([cat, n]) => ({cat, n}));
document.getElementById("pills").innerHTML = pillOrder.map(p => {
  const color = CATEGORY_COLOR[p.cat] || "#9aa6bf";
  return `<div class="pill"><span class="sw" style="background:${color}"></span>${esc(p.cat)} (${p.n})</div>`;
}).join("");

// Draw the multi-column layout table directly below the map wrapper
const lists = document.getElementById("lists");
const sorted = STATE_ROWS.slice().sort((a,b)=>a.state.localeCompare(b.state));
const COLS = 4;
const perCol = Math.ceil(sorted.length / COLS);

for(let i=0;i<COLS;i++){
  const chunk = sorted.slice(i*perCol,(i+1)*perCol);
  const col = document.createElement("div");
  col.className = "col";
  col.innerHTML = chunk.map(r => `
    <div class="row">
      <div class="name" title="${esc(r.state)}">${esc(r.state)}</div>
      <div class="val">${esc(r.culprit)}</div>
    </div>
  `).join("");
  lists.appendChild(col);
}

// Initialize D3 Rendering engine parsing TopoJSON layout shapes natively
const svg = d3.select("#map");
const tooltip = d3.select("#tt");
const width = 975, height = 610;

const projection = d3.geoAlbersUsa().scale(1300).translate([width/2, height/2]);
const path = d3.geoPath(projection);

function placeTooltip(event){
  const rect = tooltip.node().getBoundingClientRect();
  const pad = 10;
  let x = event.pageX + 14;
  let y = event.pageY + 14;
  if (x + rect.width > window.innerWidth - pad) x = window.innerWidth - rect.width - pad;
  if (y + rect.height > window.innerHeight - pad) y = window.innerHeight - rect.height - pad;
  tooltip.style("left", x+"px").style("top", y+"px");
}

function showTip(event, stateName, data){
  const tagColor = data.status === "Confirmed Baseline" ? "#10b981" : "#da291c";
  tooltip
    .style("display","block")
    .html(
      `<strong>${esc(stateName)} Risk Metrics</strong>
       <div class="tooltip-stat">🚨 Vector: ${esc(data.culprit)}</div>
       <div>Total Tracked Animal Deaths: <b>${esc(data.totalDeaths)}</b></div>
       <div>Annual Rate Per 1M: <b>${esc(data.rate)}</b></div>
       <div>Workbook Data Coverage: <b>${esc(data.coverage)}</b></div>
       <div class="status-tag" style="background:${tagColor}; color:#fff;">${esc(data.status)}</div>
       <div class="narrative">${esc(data.text)}</div>`
    );
  placeTooltip(event);
}

function hideTip(){ tooltip.style("display","none"); }

// Safe, clean runtime path construction matching valid CDN channels on GitHub Pages
d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(us => {
  const states = topojson.feature(us, us.objects.states).features;
  const g = svg.attr("viewBox", `0 0 ${width} ${height}`).append("g");

  const layer = g.selectAll("g.state")
    .data(states)
    .join("g")
    .attr("class","state");

  layer.append("path")
    .attr("d", path)
    .attr("fill", d => {
      const row = ROW_BY_STATE[d.properties.name];
      return row ? CATEGORY_COLOR[row.cat] : "#112440";
    })
    .attr("fill-opacity", 0.88);

  layer.append("path").attr("d", path)
    .attr("fill","none").attr("stroke","#fff").attr("stroke-opacity",0.12)
    .attr("stroke-width",1.0).attr("stroke-linejoin","round");

  layer.append("path")
    .attr("class","hover-outline")
    .attr("d", path)
    .attr("fill","none")
    .attr("stroke","#da291c") 
    .attr("stroke-opacity",0)
    .attr("stroke-width",2.5)
    .attr("pointer-events","none");

  const gIcons = g.append("g");

  states.forEach(d => {
    const name = d.properties.name;
    const row = ROW_BY_STATE[name];
    if(!row || !SVG_PATH_DICTIONARY[row.icon]) return;

    const centroid = path.centroid(d);
    if (!centroid || isNaN(centroid[0]) || isNaN(centroid[1])) return;

    const [[x0,y0],[x1,y1]] = path.bounds(d);
    const size = Math.max(16, Math.min(28, Math.min(x1-x0, y1-y0) * 0.55)); // Upgraded scale modifier for clarity

    gIcons.append("path")
      .attr("d", SVG_PATH_DICTIONARY[row.icon])
      .attr("class", "map-vector-icon")
      .attr("transform", `translate(${centroid[0] - size/2}, ${centroid[1] - size/2}) scale(${size / 24})`)
      .style("pointer-events", "none");
  });

  layer.on("mousemove", (event, d) => {
      const row = ROW_BY_STATE[d.properties.name];
      if(!row){ hideTip(); return; }
      showTip(event, d.properties.name, row);
      d3.select(event.currentTarget).select(".hover-outline").attr("stroke-opacity", .95);
    })
    .on("mouseout", (event) => {
      hideTip();
      d3.select(event.currentTarget).select(".hover-outline").attr("stroke-opacity", 0);
    });

}).catch(err => console.error("US TopoJSON framework initialization failure:", err));

  const hidden = embedPanel.hasAttribute("hidden");

    embedPanel.removeAttribute("hidden");
    embedToggle.setAttribute("aria-expanded","true");
    embedToggle.textContent = "Hide embed code";
  }else{
    embedPanel.setAttribute("hidden","");
    embedToggle.setAttribute("aria-expanded","false");
    embedToggle.textContent = "Get embed code";
  }
});
