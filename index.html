<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Most Dangerous Animal In Each State</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    :root {
      --bgTop: #0b1a30;         /* CSB Midnight Navy */
      --bgBottom: #040a14;
      --cardTop: #112440;
      --cardBottom: #071324;
      --ink: #f4f7f5;
      --muted: #8fa098;
      --border: rgba(255, 255, 255, .06);
      --shadow: 0 20px 60px rgba(0,0,0,.65);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--bgTop), var(--bgBottom));
      padding: 26px 16px 40px;
    }

    .wrap { max-width: 1100px; margin: 0 auto; }
    header { text-align: center; padding: 4px 0 20px; }
    h1 { margin: 0; font-size: 28px; font-weight: 950; text-transform: uppercase; border-left: 5px solid #da291c; padding-left: 15px; display: inline-block; }

    .card { background: linear-gradient(180deg, var(--cardTop), var(--cardBottom)); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .map-wrap { padding: 16px; }
    .map-frame { background: rgba(0, 0, 0, .25); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; position: relative; }
    
    svg { width: 100%; height: auto; display: block; }
    .state { stroke: #fff; stroke-width: 1.2; stroke-opacity: 0.15; cursor: pointer; transition: stroke-opacity 0.15s ease; }
    .state:hover { stroke: #da291c !important; stroke-opacity: 1 !important; stroke-width: 2.5px; }

    .pills { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 14px 6px; border-top: 1px solid rgba(255,255,255,.06); }
    .pill { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 900; padding: 6px 12px; border-radius: 999px; background: rgba(255,255,255,.05); border: 1px solid var(--border); text-transform: uppercase; }
    .sw { width: 10px; height: 10px; border-radius: 3px; border: 1px solid rgba(255,255,255,.2); }

    .lists { padding: 14px; display: grid; gap: 12px; grid-template-columns: repeat(4,1fr); }
    @media(max-width:1000px){ .lists{grid-template-columns:repeat(2,1fr);} }
    @media(max-width:600px){ .lists{grid-template-columns:1fr;} }

    .col { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; }
    .row { display: flex; justify-content: space-between; gap: 10px; padding: 7px 6px; border-bottom: 1px dashed rgba(255,255,255,.08); font-size: 12px; }
    .row:last-child { border-bottom: none; }
    .name { font-weight: 900; color: rgba(245,247,251,.85); }
    .val { font-weight: 900; color: #ecc94b; text-align: right; }

    .tooltip { position: absolute; pointer-events: none; display: none; z-index: 999; background: #0b1a30; border: 1px solid #da291c; border-radius: 12px; padding: 14px; box-shadow: 0 16px 40px rgba(0,0,0,.6); max-width: 300px; }
    .tooltip strong { display: block; font-size: 15px; font-weight: 950; margin-bottom: 4px; text-transform: uppercase; color: #fff; }
    .tooltip-stat { font-size: 13px; font-weight: 800; color: #ecc94b; margin-bottom: 6px; }
  </style>
</head>
<body>

  <div class="wrap">
    <header>
      <h1>Most Dangerous Animal by State Matrix</h1>
    </header>

    <div class="card">
      <div class="map-wrap">
        <div class="map-frame">
          <svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg">
            <path id="WA" class="state" data-name="Washington" d="M90,40 L195,55 L180,110 L80,100 Z" />
            <path id="OR" class="state" data-name="Oregon" d="M80,100 L180,110 L160,210 L60,190 Z" />
            <path id="CA" class="state" data-name="California" d="M60,190 L160,210 L120,380 L200,450 L140,490 L40,320 Z" />
            <path id="ID" class="state" data-name="Idaho" d="M195,55 L215,58 L205,150 L260,170 L245,220 L160,210 L180,110 Z" />
            <path id="MT" class="state" data-name="Montana" d="M215,58 L390,75 L370,165 L205,150 Z" />
            <path id="WY" class="state" data-name="Wyoming" d="M260,170 L380,185 L365,275 L245,260 Z" />
            <path id="UT" class="state" data-name="Utah" d="M245,220 L310,230 L300,320 L230,310 Z" />
            <path id="AZ" class="state" data-name="Arizona" d="M230,310 L300,320 L285,440 L210,420 Z" />
            <path id="CO" class="state" data-name="Colorado" d="M310,230 L440,245 L425,335 L300,320 Z" />
            <path id="NM" class="state" data-name="New Mexico" d="M300,320 L425,335 L410,445 L285,440 Z" />
            <path id="TX" class="state" data-name="Texas" d="M425,335 L490,340 L500,400 L580,420 L540,560 L460,530 L410,445 Z" />
            <path id="MO" class="state" data-name="Missouri" d="M530,240 L610,240 L620,310 L540,310 Z" />
            <path id="OK" class="state" data-name="Oklahoma" d="M430,340 L520,342 L518,385 L432,382 Z" />
            <path id="IL" class="state" data-name="Illinois" d="M605,170 L650,170 L635,250 L595,245 Z" />
            <path id="OH" class="state" data-name="Ohio" d="M695,160 L750,150 L760,210 L705,220 Z" />
            <path id="PA" class="state" data-name="Pennsylvania" d="M755,145 L830,135 L840,185 L765,195 Z" />
            <path id="NY" class="state" data-name="New York" d="M780,95 L845,85 L860,135 L820,140 Z" />
            <path id="NC" class="state" data-name="North Carolina" d="M740,245 L840,235 L855,275 L755,285 Z" />
            <path id="FL" class="state" data-name="Florida" d="M760,400 L810,405 L840,510 L810,515 Z" />
          </svg>
        </div>
      </div>

      <div class="pills" id="pills"></div>
      <div class="lists" id="lists"></div>
    </div>
  </div>

  <div id="tt" class="tooltip"></div>

<script>
const CATEGORY_COLOR = {
  'Bees, Wasps & Hornets': '#1d3557',
  'Dogs':                  '#457b9d',
  'Livestock Mammals':     '#e63946',
  'Horses (Riding Falls)': '#a8dadc',
  'Insufficient Data':     '#94a3b8'
};

const STATE_ROWS = [
  {state:"Texas", culprit:"Bees, Wasps & Hornets", totalDeaths:291, rate:"1.40", coverage:"84%", cat:"Bees, Wasps & Hornets", text:"Backyard stinging insects account for nearly a third of all tracked animal fatalities in the state."},
  {state:"California", culprit:"Dogs", totalDeaths:200, rate:"0.73", coverage:"83%", cat:"Dogs", text:"Proximity in dense suburban environments keeps domestic dogs locked at the top of the mapping vector."},
  {state:"Florida", culprit:"Dogs", totalDeaths:141, rate:"0.91", coverage:"79%", cat:"Dogs", text:"Domestic animal incidents safely outpace coastal longshots like sharks or regional alligator logs."},
  {state:"Ohio", culprit:"Bees, Wasps & Hornets", totalDeaths:101, rate:"1.23", coverage:"84%", cat:"Bees, Wasps & Hornets", text:"High-density yard landscaping encounters with nested insects keep sting logs high."},
  {state:"Pennsylvania", culprit:"Bees, Wasps & Hornets", totalDeaths:89, rate:"0.98", coverage:"72%", cat:"Bees, Wasps & Hornets", text:"Wooded valleys create frequent exposure loops during outdoor property maintenance loops."},
  {state:"North Carolina", culprit:"Bees, Wasps & Hornets", totalDeaths:86, rate:"1.15", coverage:"83%", cat:"Bees, Wasps & Hornets", text:"Seasonal outdoor transitions preserve stinging insects at the top of local health indices."},
  {state:"New York", culprit:"Bees, Wasps & Hornets", totalDeaths:80, rate:"0.58", coverage:"81%", cat:"Bees, Wasps & Hornets", text:"Upstate timber spaces overlapping with park zones generate the state's main allergy threat."},
  {state:"Missouri", culprit:"Other mammals (livestock)", totalDeaths:69, rate:"1.60", coverage:"71%", cat:"Livestock Mammals", text:"Pasture infrastructure limits create handling risks where cattle incidents drive metrics."},
  {state:"Oklahoma", culprit:"Dogs", totalDeaths:66, rate:"2.35", coverage:"82%", cat:"Dogs", text:"Domestic dog encounters track with high statistical visibility across residential sectors."},
  {state:"Montana", culprit:"Other mammals (livestock)", totalDeaths:28, rate:"3.63", coverage:"39%", cat:"Livestock Mammals", text:"Handling 1,500-lb beef assets in deep pasture corridors drives the top per-capita rate in the country."},
  {state:"Wyoming", culprit:"Insufficient data", totalDeaths:12, rate:"2.95", coverage:"0%", cat:"Insufficient Data", text:"Low sample counts prompt data shielding; structural patterns point toward regional livestock lines."}
];

const ROW_BY_STATE = Object.fromEntries(STATE_ROWS.map(r => [r.state, r]));

// Dynamic UI Builders
const counts = {};
STATE_ROWS.forEach(r => counts[r.cat] = (counts[r.cat]||0)+1);
document.getElementById("pills").innerHTML = Object.entries(counts).map(([cat, n]) => `
  <div class="pill"><span class="sw" style="background:${CATEGORY_COLOR[cat]}"></span>${cat} (${n})</div>
`).join("");

const lists = document.getElementById("lists");
const sorted = STATE_ROWS.slice().sort((a,b)=>a.state.localeCompare(b.state));
const perCol = Math.ceil(sorted.length / 3);
for(let i=0; i<3; i++){
  const col = document.createElement("div");
  col.className = "col";
  col.innerHTML = sorted.slice(i*perCol, (i+1)*perCol).map(r => `
    <div class="row"><div class="name">${r.state}</div><div class="val">${r.culprit}</div></div>
  `).join("");
  lists.appendChild(col);
}

// Interaction Layers
const tooltip = d3.select("#tt");
d3.selectAll(".state")
  .style("fill", function() {
    const row = ROW_BY_STATE[this.getAttribute("data-name")];
    return row ? CATEGORY_COLOR[row.cat] : "#112440";
  })
  .on("mouseover", function(event) {
    const row = ROW_BY_STATE[this.getAttribute("data-name")];
    if(!row) return;
    tooltip.style("display", "block").html(`
      <strong>${this.getAttribute("data-name")} Risk Profile</strong>
      <div class="tooltip-stat">🚨 Threat: ${row.culprit}</div>
      <div>Total Animal Deaths: <b>${row.totalDeaths}</b></div>
      <div>Annual Rate Per 1M: <b>${row.rate}</b></div>
      <div class="narrative">${row.text}</div>
    `);
  })
  .on("mousemove", function(event) {
    tooltip.style("left", (event.pageX + 15) + "px").style("top", (event.pageY + 15) + "px");
  })
  .on("mouseleave", function() {
    tooltip.style("display", "none");
  });
</script>
</body>
</html>
