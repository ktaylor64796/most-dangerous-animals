                UIOverlay.update(layer.feature.properties);
            }
        }

        let topoJsonLayer;
        function blurLayer(e) {
            topoJsonLayer.resetStyle(e.target);
            UIOverlay.update();
        }

        function onEachFeature(feature, layer) {
            layer.on({
                mouseover: focusLayer,
                mouseout: blurLayer
            });
        }

        // Stream high-fidelity USA boundary lines and overlay markers
        fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json')
            .then(res => res.json())
            .then(geoJsonData => {
                topoJsonLayer = L.geoJson(geoJsonData, {
                    style: styleStatePolygons,
                    onEachFeature: onEachFeature
                }).addTo(map);

                // Inject Custom Silhouette Markers onto State Coordinates
                Object.keys(stateWildlifeData).forEach(state => {
                    const meta = stateWildlifeData[state];
                    if (svgIcons[meta.icon]) {
                        const customLabelMarker = L.divIcon({
                            html: `<div class="state-label-wrapper">
                                    ${svgIcons[meta.icon]}
                                    <span class="state-abbrev-text">${state.substring(0,3)}</span>
                                   </div>`,
                            className: 'leaflet-div-icon-custom-override',
                            iconSize: [40, 40],
                            iconAnchor: [20, 20]
                        });
                        L.marker([meta.lat, meta.lng], { icon: customLabelMarker, interactive: false }).addTo(map);
                    }
                });
            });

        // Initialize Legend Box Key Matrix
        const mapLegend = L.control({position: 'bottomright'});
        mapLegend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<strong>Threat Vector Class</strong><br>';
            Object.keys(designColors).forEach(category => {
                div.innerHTML += `<i style="background:${designColors[category]}"></i> ${category}<br>`;
            });
            return div;
        };
        mapLegend.addTo(map);
    </script>
</body>
</html>
