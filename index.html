            letter-spacing: 0.5px;
        }

            color: #444;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #map {
            width: 100%;
            height: 650px;
            max-width: 1100px;
            margin: 0 auto;
            background: #fcfbf7;

            align-items: center;
            text-align: center;

            color: #111;

        .info {

            width: 16px;
            height: 16px;
            float: left;
            margin-right: 10px;
            border: 1px solid rgba(0,0,0,0.3);
        }
    </style>
</head>

            "Nebraska": { culprit: "Domestic Cattle", emoji: "🐄", odds: "1 in 58,000", prob: "0.00172%", cat: "Cattle/Livestock", text: "Heavy livestock density places handlers in enclosed corrals with aggressive bulls.", lat: 41.1, lng: -98.2 },
            "Nevada": { culprit: "Deer Mouse", emoji: "🐭", odds: "1 in 165,000", prob: "0.00061%", cat: "Ticks & Parasites", text: "Inhalation of airborne dust from dried rodent droppings can transmit lethal Hantavirus.", lat: 38.8, lng: -117.1 },
            "New Hampshire": { culprit: "Whitetail Deer", emoji: "🦌", odds: "1 in 130,000", prob: "0.00077%", cat: "Deer Collisions", text: "Heavily forested highways experience consistent, severe deer-vehicle crossings.", lat: 43.4, lng: -71.5 },
            "New Jersey": { culprit: "Eastern Yellow Jacket", emoji: "🐝", odds: "1 in 195,000", prob: "0.00051%", cat: "Stinging Insects", text: "Intense residential density causes frequent backyard ground-nest disruptions.", lat: 40.3, lng: -74.5 },
            "New Mexico": { culprit: "Large Free-Ranging Mammals", emoji: "🐄", odds: "1 in 41,000", prob: "0.00244%", cat: "Large Wild Mammals", text: "Severe droughts push free-ranging range cattle and wild elk down onto dark transit corridors.", lat: 34.8, lng: -106.2 },
            "New York": { culprit: "Common Hornet", emoji: "🐝", odds: "1 in 240,000", prob: "0.00042%", cat: "Stinging Insects", text: "Woodlands overlapping manicured parks make nesting wasps the top medical emergency threat.", lat: 42.1, lng: -74.9 },
            "North Carolina": { culprit: "Invasive Fire Ant", emoji: "🐜", odds: "1 in 78,000", prob: "0.00128%", cat: "Venomous Creepers", text: "Rapid fire ant expansion leaves residents vulnerable during simple yard maintenance.", lat: 35.6, lng: -79.8 },
            "North Dakota": { culprit: "American Bison", emoji: "🦬", odds: "1 in 92,000", prob: "0.00109%", cat: "Large Wild Mammals", text: "Bison easily outpace human sprinters and gore visitors who cross defensive buffer lines.", lat: 47.5, lng: -99.7 },
            "Ohio": { culprit: "Common Yellow Jacket", emoji: "🐝", odds: "1 in 110,000", prob: "0.00091%", cat: "Stinging Insects", text: "Dense residential footprint keeps stinging insects as the single top wild threat.", lat: 40.4, lng: -82.9 },
            "Oklahoma": { culprit: "Domestic Cattle", emoji: "🐄", odds: "1 in 56,000", prob: "0.00179%", cat: "Cattle/Livestock", text: "Storms compromise ranch fencing, letting livestock wander onto unlit country highways.", lat: 35.5, lng: -96.9 },
            "Oregon": { culprit: "Yellow Jacket / Wasp", emoji: "🐝", odds: "1 in 120,000", prob: "0.00083%", cat: "Stinging Insects", text: "Logging and forestry workforces face persistent occupational swarm exposure risks.", lat: 44.5, lng: -122.1 },
            "Pennsylvania": { culprit: "Common Honeybee", emoji: "🐝", odds: "1 in 95,000", prob: "0.00105%", cat: "Stinging Insects", text: "Densely populated wooded valleys make accidental hive encounters the primary emergency origin.", lat: 40.5, lng: -77.2 },
            "Rhode Island": { culprit: "Blacklegged Tick", emoji: "🕷️", odds: "1 in 140,000", prob: "0.00071%", cat: "Ticks & Parasites", text: "Lacking vast wildlands, small brush regions see heavy tick-borne pathogen propagation.", lat: 41.6, lng: -71.5 },
            "South Carolina": { culprit: "Paper Wasp", emoji: "🐝", odds: "1 in 84,000", prob: "0.00119%", cat: "Stinging Insects", text: "Humid conditions facilitate massive, multi-colony wasp nest architecture on local structures.", lat: 33.8, lng: -80.9 },
            "South Dakota": { culprit: "Domestic Cattle", emoji: "🐄", odds: "1 in 48,000", prob: "0.00208%", cat: "Cattle/Livestock", text: "Immense open-range pasture systems expose ranch hands to unpredictable livestock trauma.", lat: 44.3, lng: -100.3 },
            "Tennessee": { culprit: "Brown Recluse Spider", emoji: "🕷️", odds: "1 in 42,435", prob: "0.00236%", cat: "Scorpion/Spiders", text: "Their preference for dark closets and crawlspaces results in high tissue-destruction bites.", lat: 35.7, lng: -86.7 },
            "Texas": { culprit: "Invasive Fire Ant", emoji: "🐜", odds: "1 in 52,000", prob: "0.00192%", cat: "Venomous Creepers", text: "Persistent fire ant super-colonies pose a constant hazard to hyper-allergic individuals.", lat: 31.0, lng: -100.0 },

            "Vermont": { culprit: "Blacklegged Tick", emoji: "🕷️", odds: "1 in 68,000", prob: "0.00147%", cat: "Ticks & Parasites", text: "Warming winter climates have triggered an explosion of ticks across local pastures.", lat: 44.0, lng: -72.7 },
            "Virginia": { culprit: "Common Yellow Jacket", emoji: "🐝", odds: "1 in 105,000", prob: "0.00095%", cat: "Stinging Insects", text: "Agricultural borders pushing into sprawl create frequent ground-nest disruptions.", lat: 37.7, lng: -78.2 },
            "Washington": { culprit: "Western Yellow Jacket", emoji: "🐝", odds: "1 in 155,000", prob: "0.00065%", cat: "Stinging Insects", text: "Absolute volume of animal medical emergencies is driven entirely by aggressive nesting wasps.", lat: 47.4, lng: -121.4 },
            "West Virginia": { culprit: "Whitetail Deer", emoji: "🦌", odds: "1 in 30,271", prob: "0.00330%", cat: "Deer Collisions", text: "Canopy-covered, narrow mountainous roads generate the nation's premier collision index.", lat: 38.6, lng: -80.5 },
            "Wisconsin": { culprit: "Whitetail Deer", emoji: "🦌", odds: "1 in 62,000", prob: "0.00161%", cat: "Deer Collisions", text: "Massive deer herds crossing high-speed rural commuter lanes easily outpace carnivore metrics.", lat: 44.2, lng: -89.6 },
            "Wyoming": { culprit: "Grizzly Bear", emoji: "🐻", odds: "1 in 28,000", prob: "0.00357%", cat: "Apex Predators", text: "Backcountry wilderness routes create frequent, high-stakes contact with grizzly populations.", lat: 42.7, lng: -107.3 }
        };

        // Geographic Style Mapping
        function stylePolygon(feature) {
            const state = stateWildlifeData[feature.properties.name];
            return {
                fillColor: state ? categoryColors[state.cat] : '#fcfbf7',
                weight: 1.5,
                opacity: 1,
                color: '#fcfbf7', // Crisp clean vector separation lines
                fillOpacity: 0.9
            };
        }

        // Dashboard Overlay Setup
        const infoWindow = L.control();
        infoWindow.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info');
            this.update();
            return this._div;
        };
        infoWindow.update = function (props) {
            if (props && stateWildlifeData[props.name]) {
                const s = stateWildlifeData[props.name];
                this._div.innerHTML = `<h4>${props.name} Assessment</h4>
                    <p>🎯 <b>Top Culprit:</b> ${s.culprit} ${s.emoji}</p>
                    <p>📊 <b>Annual Encounter Odds:</b> ${s.odds}</p>
                    <p>📈 <b>Implied Probability:</b> ${s.prob}</p>
                    <p style="font-size:11px; color:#555; border-top:1px solid #ddd; padding-top:4px;">${s.text}</p>`;
            } else {
                this._div.innerHTML = '<h4>State Data Hub</h4>Hover over a state polygon';
            }
        };
        infoWindow.addTo(map);

        function highlightState(e) {
            const layer = e.target;
            layer.setStyle({ weight: 2.5, color: '#222' });
            if (stateWildlifeData[layer.feature.properties.name]) {
                infoWindow.update(layer.feature.properties);
            }
        }

        let geojsonLayer;
        function resetState(e) {
            geojsonLayer.resetStyle(e.target);
            infoWindow.update();
        }

        function wireFeatures(feature, layer) {
            layer.on({
                mouseover: highlightState,
                mouseout: resetState
            });
        }

        // Stream geographic boundary coordinates and overlay data blocks
        fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json')
            .then(res => res.json())
            .then(geoData => {
                geojsonLayer = L.geoJson(geoData, {
                    style: stylePolygon,
                    onEachFeature: wireFeatures
                }).addTo(map);

                // Populate every individual state with its matching asset icon text combo
                Object.keys(stateWildlifeData).forEach(stateName => {
                    const d = stateWildlifeData[stateName];
                    const customLabel = L.divIcon({
                        html: `<div class="state-label-container">
                                <span class="state-icon-emoji">${d.emoji}</span>
                               <span class="state-text-label">${stateName.substring(0,3)}</span>
                               </div>`,
                        className: 'custom-div-icon',
                        iconSize: [40, 40],
                        iconAnchor: [20, 20]
                    });
                    L.marker([d.lat, d.lng], { icon: customLabel, interactive: false }).addTo(map);
                });
            });

        // Generate Color Legend Matrix
        const legendKey = L.control({position: 'bottomright'});
        legendKey.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<strong>Risk Matrix</strong><br>';
            Object.keys(categoryColors).forEach(key => {
                div.innerHTML += `<i style="background:${categoryColors[key]}"></i> ${key}<br>`;
            });
            return div;
        };
        legendKey.addTo(map);
    </script>
</body>
</html>
